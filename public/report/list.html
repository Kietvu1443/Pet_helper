<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thú Cưng Thất Lạc & Tìm Thấy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}.card-img{width:100%;height:200px;object-fit:cover}.badge-lost{background-color:#fee2e2;color:#b91c1c}.badge-found{background-color:#dcfce7;color:#166534}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-[#2a6b47] text-white"><div class="max-w-7xl mx-auto px-4 py-6 flex items-center justify-between"><a href="/" class="flex items-center gap-3 text-white no-underline"><div class="bg-white text-[#2a6b47] w-10 h-10 rounded-full flex items-center justify-center font-black text-sm">PET</div><h1 class="text-xl font-bold tracking-wide">PET HELPER</h1></a></div></header>
  <div id="submittedBanner" class="max-w-7xl mx-auto px-4 mt-6 hidden"><div class="bg-green-50 border border-green-200 text-green-800 px-6 py-4 rounded-xl text-sm font-medium">✅ Báo cáo của bạn đã được gửi thành công! Vui lòng chờ quản trị viên phê duyệt.</div></div>
  <main class="max-w-7xl mx-auto px-4 py-10">
    <section class="mb-16">
      <div class="flex items-center gap-3 mb-6"><span class="px-3 py-1 rounded-full text-sm font-bold badge-lost">🔴 THẤT LẠC</span><h2 class="text-2xl font-bold text-gray-800">Thú cưng đang thất lạc</h2></div>
      <p id="lost-status" class="text-sm text-gray-500 mb-3">Đang tải dữ liệu...</p>
      <div id="lost-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"><div class="col-span-full text-center text-gray-400 py-8">Đang tải...</div></div>
      <div id="lost-pagination" class="flex justify-center mt-6 gap-2"></div>
    </section>
    <section>
      <div class="flex items-center gap-3 mb-6"><span class="px-3 py-1 rounded-full text-sm font-bold badge-found">🟢 TÌM THẤY</span><h2 class="text-2xl font-bold text-gray-800">Thú cưng đã tìm thấy</h2></div>
      <p id="found-status" class="text-sm text-gray-500 mb-3">Đang tải dữ liệu...</p>
      <div id="found-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"><div class="col-span-full text-center text-gray-400 py-8">Đang tải...</div></div>
      <div id="found-pagination" class="flex justify-center mt-6 gap-2"></div>
    </section>
  </main>
  <script>
    (function(){
      const LIMIT=10;
      function setStatus(id,message,isError){const el=document.getElementById(id);if(!el)return;el.textContent=message;el.className=`text-sm mb-3 ${isError?'text-red-600':'text-gray-500'}`;}
      function renderLoading(gridId){const grid=document.getElementById(gridId);if(grid)grid.innerHTML='<div class="col-span-full text-center text-gray-400 py-8">Đang tải...</div>';}
      function renderCard(report){const badgeClass=report.type==='lost'?'badge-lost':'badge-found';const badgeText=report.type==='lost'?'Thất lạc':'Tìm thấy';return `<div class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition-shadow border border-gray-100"><div class="relative"><img src="${report.image||'/images/logo.svg'}" alt="Pet" class="card-img" onerror="this.src='/images/logo.svg'"><span class="absolute top-3 left-3 px-2 py-1 rounded-full text-xs font-bold ${badgeClass}">${badgeText}</span></div><div class="p-4"><p class="text-gray-700 text-sm line-clamp-2 mb-3">${report.description||'Không có mô tả'}</p><div class="flex items-center gap-1 text-xs text-gray-500 mb-1"><span>📍</span><span class="truncate">${report.location||'Chưa rõ'}</span></div><div class="flex items-center gap-1 text-xs text-gray-500 mb-1"><span>👤</span><span>${report.reporter_name||'Ẩn danh'}</span></div><div class="flex items-center gap-1 text-xs text-emerald-700 font-semibold"><span>📞</span><a href="tel:${report.phone||''}" class="hover:underline">${report.phone||'-'}</a></div></div></div>`;}
      function renderPagination(containerId,currentPage,totalPages,handlerName){const container=document.getElementById(containerId);if(!container)return;if(!totalPages||totalPages<=1){container.innerHTML='';return;}let html='';for(let i=1;i<=totalPages;i++){const active=i===currentPage?'bg-[#2a6b47] text-white':'bg-white text-gray-700 hover:bg-gray-100';html+=`<button onclick="${handlerName}(${i})" class="px-3 py-1.5 rounded-lg text-sm font-semibold border border-gray-200 ${active} transition-colors">${i}</button>`;}container.innerHTML=html;}
      async function fetchReports(type,page){const response=await fetch(`/api/v1/reports?type=${type}&page=${page}&limit=${LIMIT}`);const payload=await response.json();if(!response.ok||!payload.success||!payload.data){throw new Error((payload&&payload.message)||'Không thể tải dữ liệu');}return payload.data;}
      async function loadSection(opts){const {type,page,gridId,paginationId,statusId,emptyMessage,handlerName}=opts;const grid=document.getElementById(gridId);if(!grid)return;const previousHtml=grid.innerHTML;setStatus(statusId,'Đang tải dữ liệu...',false);renderLoading(gridId);try{const result=await fetchReports(type,page);const rows=Array.isArray(result.data)?result.data:[];grid.innerHTML=rows.length?rows.map(renderCard).join(''):`<div class="col-span-full text-center text-gray-400 py-8">${emptyMessage}</div>`;renderPagination(paginationId,page,result.totalPages||0,handlerName);setStatus(statusId,'Đã tải dữ liệu thành công.',false);}catch(error){grid.innerHTML=previousHtml;setStatus(statusId,error.message||'Không thể tải dữ liệu.',true);}}
      window.loadLost=function(page){loadSection({type:'lost',page:gridNum(page),gridId:'lost-grid',paginationId:'lost-pagination',statusId:'lost-status',emptyMessage:'Chưa có thú cưng thất lạc nào được báo cáo.',handlerName:'loadLost'});};
      window.loadFound=function(page){loadSection({type:'found',page:gridNum(page),gridId:'found-grid',paginationId:'found-pagination',statusId:'found-status',emptyMessage:'Chưa có thú cưng nào được tìm thấy.',handlerName:'loadFound'});};
      function gridNum(v){const n=Number(v);return Number.isNaN(n)||n<1?1:n;}
      const params=new URLSearchParams(window.location.search);if(params.get('submitted')==='1'){const banner=document.getElementById('submittedBanner');if(banner)banner.classList.remove('hidden');}
      window.loadLost(1);window.loadFound(1);
    })();
  </script>
</body>
</html>
