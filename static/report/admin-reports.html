<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quản Lý Báo Cáo</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--bg-body:#F4F7F6;--bg-surface:#FFF;--text-main:#1A202C;--text-muted:#718096;--border-color:#E2E8F0;--hover-bg:#EDF2F7;--primary:#2b663e;--blue-light:#e6f0eb;--navbar-bg:#2b663e;--navbar-text:#FFF}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background-color:var(--bg-body);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.navbar{height:64px;background-color:var(--navbar-bg);color:var(--navbar-text);display:flex;align-items:center;justify-content:space-between;padding:0 32px}
.layout{display:flex;flex:1;overflow:hidden}.sidebar{width:320px;background:#fff;border-right:1px solid var(--border-color);padding:16px;overflow-y:auto}.content{flex:1;padding:32px;overflow-y:auto}.content-inner{max-width:1100px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid #e2e8f0;padding-bottom:10px}.tab-btn{padding:8px 16px;border:none;background:transparent;font-weight:600;color:#64748b;cursor:pointer;border-radius:6px}.tab-btn.active{background:var(--primary);color:#fff}
table{width:100%;border-collapse:collapse}th,td{padding:14px 12px;text-align:left;border-bottom:1px solid #f1f5f9}th{background:#f8fafc;font-weight:600;color:#475569;font-size:.9rem}
.badge{padding:4px 8px;border-radius:20px;font-size:.8rem;font-weight:600}.badge.pending{background:#fef3c7;color:#d97706}.badge.approved{background:#dcfce7;color:#166534}.badge.rejected{background:#fee2e2;color:#b91c1c}.badge.lost{background:#fee2e2;color:#b91c1c}.badge.found{background:#dcfce7;color:#166534}
.btn-view{background:#f1f5f9;color:#334155;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:600}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:100}.modal-content{background:#fff;width:800px;max-width:90%;border-radius:8px;overflow:hidden}.modal-header{padding:20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}.modal-body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pet-image{width:100%;height:250px;object-fit:cover;border-radius:8px}.info-group{margin-bottom:15px}.info-label{font-size:.85rem;color:#64748b;font-weight:600;text-transform:uppercase}.info-value{font-size:1rem;color:#1e293b;font-weight:500;margin-top:4px;word-break:break-word}.modal-footer{padding:15px 20px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}.btn{padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px}.btn-approve{background:#16a34a;color:#fff}.btn-reject{background:#dc2626;color:#fff}.btn-revert{background:#0284c7;color:#fff}.btn-delete{background:#7f1d1d;color:#fff}.btn-close{background:#fff;border:1px solid #cbd5e1;color:#475569}
</style>
</head>
<body>
<nav class="navbar"><div style="display:flex;align-items:center;gap:8px;"><div style="background:#fff;color:#2b663e;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900">PET</div><div style="font-weight:800;font-size:20px;letter-spacing:.5px">PET HELPER</div></div></nav>
<div class="layout"><aside class="sidebar"><h1 style="font-size:22px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-color);">Cài đặt</h1><a href="/my-reports" style="display:block;padding:8px;border-radius:8px;text-decoration:none;color:inherit">Hồ sơ</a><a href="/admin/reports" style="display:block;padding:8px;border-radius:8px;text-decoration:none;background:var(--blue-light);color:var(--primary);font-weight:600">Quản lý báo cáo</a></aside>
<main class="content"><div class="content-inner"><h2 style="font-size:24px;margin-bottom:24px;">Quản lý báo cáo thất lạc & tìm thấy</h2><div class="card"><div class="tabs"><button class="tab-btn active" onclick="filterData('pending', this)">Chờ duyệt</button><button class="tab-btn" onclick="filterData('approved', this)">Đã duyệt</button><button class="tab-btn" onclick="filterData('rejected', this)">Đã từ chối</button></div><div id="adminReportsStatus" style="min-height:22px;color:#475569;font-size:.9rem;margin-bottom:10px"></div><table><thead><tr><th>Người báo cáo</th><th>Loại</th><th>Vị trí</th><th>Ngày gửi</th><th>Trạng thái</th><th>Hành động</th></tr></thead><tbody id="table-body"></tbody></table></div></div></main></div>
<div id="detailModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 style="font-size:1.2rem;color:#1e293b">Chi tiết báo cáo</h2><button style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#64748b;" onclick="closeModal()">&times;</button></div><div class="modal-body"><div><img id="modal-report-img" src="https://via.placeholder.com/400x300?text=No+Image" alt="Report Image" class="pet-image" onerror="this.onerror=null;this.src='/images/logo.svg';"><div style="margin-top:15px;"><div class="info-label">Mô tả</div><div class="info-value" id="modal-description" style="font-style:italic;font-size:.95rem"></div></div></div><div><div class="info-group"><div class="info-label">Người báo cáo</div><div class="info-value" id="modal-reporter"></div></div><div class="info-group"><div class="info-label">Loại</div><div class="info-value" id="modal-type"></div></div><div class="info-group"><div class="info-label">Số điện thoại</div><div class="info-value" id="modal-phone"></div></div><div class="info-group"><div class="info-label">Email</div><div class="info-value" id="modal-email"></div></div><div class="info-group"><div class="info-label">Vị trí</div><div class="info-value" id="modal-location"></div></div><div class="info-group"><div class="info-label">Trạng thái hiện tại</div><div class="info-value" id="modal-status-text"></div></div></div></div><div class="modal-footer" id="modal-action-buttons"></div></div></div>
<script>
let reports=[];let currentFilter='pending';const statusEl=document.getElementById('adminReportsStatus');
function setStatus(message,isError){if(!statusEl)return;statusEl.textContent=message||'';statusEl.style.color=isError?'#b91c1c':'#475569';}
function getStatusInfo(status){if(status==='pending')return{text:'Chờ duyệt',class:'pending'};if(status==='approved')return{text:'Đã duyệt',class:'approved'};if(status==='rejected')return{text:'Đã từ chối',class:'rejected'};return{text:'Không rõ',class:''};}
function getTypeInfo(type){if(type==='lost')return{text:'Thất lạc',class:'lost'};if(type==='found')return{text:'Tìm thấy',class:'found'};return{text:'Không rõ',class:''};}
function formatDate(input){if(!input)return '-';return new Date(input).toLocaleDateString('vi-VN');}
async function parseJsonSafe(response){const ct=response.headers.get('content-type')||'';if(!ct.includes('application/json'))return null;try{return await response.json();}catch(e){return null;}}
async function requestV1(requestBuilder){const req=requestBuilder('/api/v1/admin/reports');const res=await fetch(req.url,req.options||{});const data=await parseJsonSafe(res);if(!res.ok||(data&&data.success===false)){throw new Error((data&&data.message)||'Không thể tải dữ liệu');}return{response:res,data};}
async function fetchReports(){const result=await requestV1(function(base){return{url:`${base}?limit=200`};});const payload=result.data||{};if(Array.isArray(payload.data)){reports=payload.data;return;}if(payload.data&&Array.isArray(payload.data.data)){reports=payload.data.data;return;}reports=[];}
function renderTable(){const rows=reports.filter(r=>r.status===currentFilter);const tableBody=document.getElementById('table-body');if(!rows.length){tableBody.innerHTML='<tr><td colspan="6" style="text-align:center; color:#64748b;">Không có báo cáo nào.</td></tr>';return;}tableBody.innerHTML=rows.map(r=>{const status=getStatusInfo(r.status);const type=getTypeInfo(r.type);const location=r.address||r.found_location||'-';return `<tr><td>${r.reporter_name||'-'}</td><td><span class="badge ${type.class}">${type.text}</span></td><td>${location}</td><td>${formatDate(r.created_at)}</td><td><span class="badge ${status.class}">${status.text}</span></td><td><button class="btn-view" onclick="openModal(${r.id})"><i class="ph ph-eye"></i> Xem</button></td></tr>`;}).join('');}
function filterData(status,btn){currentFilter=status;document.querySelectorAll('.tab-btn').forEach(item=>item.classList.remove('active'));btn.classList.add('active');renderTable();}
function openModal(id){const r=reports.find(item=>Number(item.id)===Number(id));if(!r)return;document.getElementById('modal-report-img').src=r.image||'https://via.placeholder.com/400x300?text=No+Image';document.getElementById('modal-reporter').innerText=r.reporter_name||'-';document.getElementById('modal-type').innerHTML=`<span class="badge ${r.type==='lost'?'lost':'found'}">${r.type==='lost'?'Thất lạc':'Tìm thấy'}</span>`;document.getElementById('modal-phone').innerText=r.phone||'-';document.getElementById('modal-email').innerText=r.email||'-';document.getElementById('modal-location').innerText=r.address||r.found_location||'-';document.getElementById('modal-description').innerText=r.description?`"${r.description}"`:'-';const status=getStatusInfo(r.status);document.getElementById('modal-status-text').innerHTML=`<span class="badge ${status.class}">${status.text}</span>`;const footer=document.getElementById('modal-action-buttons');footer.innerHTML='<button class="btn btn-close" onclick="closeModal()">Đóng</button>';if(r.status==='pending'){footer.innerHTML+=`<button class="btn btn-reject" onclick="updateStatus(${r.id}, 'rejected')"><i class="ph ph-x"></i> Từ chối</button>`;footer.innerHTML+=`<button class="btn btn-approve" onclick="updateStatus(${r.id}, 'approved')"><i class="ph ph-check"></i> Phê duyệt</button>`;}else if(r.status==='approved'){footer.innerHTML+=`<button class="btn btn-revert" onclick="revertReport(${r.id})"><i class="ph ph-arrow-counter-clockwise"></i> Huỷ duyệt</button>`;}else if(r.status==='rejected'){footer.innerHTML+=`<button class="btn btn-delete" onclick="deleteReport(${r.id})"><i class="ph ph-trash"></i> Xóa vĩnh viễn</button>`;}document.getElementById('detailModal').style.display='flex';}
function closeModal(){document.getElementById('detailModal').style.display='none';}
async function updateStatus(id,status){const result=await requestV1(function(base){return{url:`${base}/${id}/status`,options:{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}};});const data=result.data||{};if((result.response&&!result.response.ok)||data.success===false){alert(data.message||'Không thể cập nhật trạng thái');return;}closeModal();await loadData();}
async function revertReport(id){const result=await requestV1(function(base){return{url:`${base}/${id}/revert`,options:{method:'PATCH'}};});const data=result.data||{};if((result.response&&!result.response.ok)||data.success===false){alert(data.message||'Không thể huỷ duyệt');return;}closeModal();await loadData();}
async function deleteReport(id){if(!confirm('Bạn có chắc muốn xóa vĩnh viễn báo cáo này? Ảnh trên Cloudinary cũng sẽ bị xóa.'))return;const result=await requestV1(function(base){return{url:`${base}/${id}`,options:{method:'DELETE'}};});const data=result.data||{};if((result.response&&!result.response.ok)||data.success===false){alert(data.message||'Không thể xóa báo cáo');return;}closeModal();await loadData();}
async function loadData(){const tableBody=document.getElementById('table-body');const previousRowsHtml=tableBody.innerHTML;const previousReports=Array.isArray(reports)?reports.slice():[];setStatus('Đang tải danh sách báo cáo...',false);tableBody.innerHTML='<tr><td colspan="6" style="text-align:center; color:#64748b;">Đang tải dữ liệu...</td></tr>';try{await fetchReports();renderTable();setStatus('Đã tải danh sách báo cáo thành công.',false);}catch(error){reports=previousReports;tableBody.innerHTML=previousRowsHtml;if(!tableBody.innerHTML||!tableBody.innerHTML.trim()){tableBody.innerHTML=`<tr><td colspan="6" style="text-align:center; color:#b91c1c;">${error.message}</td></tr>`;}if(error.message&&error.message.toLowerCase().includes('forbidden')){setStatus('Bạn không có quyền truy cập trang này.',true);return;}setStatus(error.message||'Không thể tải dữ liệu.',true);}}
loadData();
</script>
</body>
</html>
