<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Pet Helper</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #40916c;
            --dark: #1b4332;
            --gray: #f8f9fa;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            font-family: 'Roboto', sans-serif;
        }

        .auth-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo .circle {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            margin: 0 auto 10px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #999;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative; /* Thêm position relative để căn chỉnh con mắt */
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
            box-sizing: border-box; /* Đảm bảo padding không làm vỡ layout */
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        /* --- STYLE CHO ICON CON MẮT --- */
        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 38px; /* Căn giữa theo label và input */
            cursor: pointer;
            color: #888;
            user-select: none;
        }

        .btn-auth {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            color: #555;
        }

        .social-icon:hover {
            background: var(--gray);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Hiệu ứng ẩn hiện form */
        #register-form { display: none; }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo">
        <div class="circle">PET</div>
        <h2 style="color: var(--primary); margin: 0;">Pet Helper</h2>
        <p style="color: #666; font-size: 0.9rem;">Cộng đồng yêu thú cưng</p>
    </div>

    <div class="tabs">
        <div id="tab-login" class="tab active" onclick="switchTab('login')">Đăng nhập</div>
        <div id="tab-register" class="tab" onclick="switchTab('register')">Đăng ký</div>
    </div>

    <form id="login-form" class="fade-in" onsubmit="handleAuth(event, 'login')">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Nhập email của bạn" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="login-pass" placeholder="••••••••" required>
            <span class="toggle-pass" onclick="togglePassword('login-pass', this)">👁️</span>
        </div>
        <button type="submit" class="btn-auth">ĐĂNG NHẬP</button>
    </form>

    <form id="register-form" onsubmit="handleAuth(event, 'register')">
        <div class="form-group">
            <label>Tên hiển thị</label>
            <input type="text" id="reg-name" placeholder="Ví dụ: Nguyễn Văn A" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="reg-pass" placeholder="Tối thiểu 6 ký tự" required minlength="6">
            <span class="toggle-pass" onclick="togglePassword('reg-pass', this)">👁️</span>
        </div>
        <button type="submit" class="btn-auth">TẠO TÀI KHOẢN</button>
    </form>

    <div class="social-login">
        <p style="font-size: 0.8rem; color: #777;">Hoặc tiếp tục với</p>
        <div class="social-icons">
            <div class="social-icon" title="Google">G</div>
            <div class="social-icon" title="Facebook">F</div>
            <div class="social-icon" title="Apple ID">A</div>
        </div>
    </div>
</div>

<script>
    // Hàm chuyển đổi giữa Đăng nhập và Đăng ký
    function switchTab(type) {
        const loginForm = document.getElementById('login-form');
        const regForm = document.getElementById('register-form');
        const tabLogin = document.getElementById('tab-login');
        const tabReg = document.getElementById('tab-register');

        if (type === 'login') {
            tabLogin.classList.add('active');
            tabReg.classList.remove('active');
            loginForm.style.display = 'block';
            regForm.style.display = 'none';
            loginForm.classList.add('fade-in');
        } else {
            tabReg.classList.add('active');
            tabLogin.classList.remove('active');
            loginForm.style.display = 'none';
            regForm.style.display = 'block';
            regForm.classList.add('fade-in');
        }
    }

    // --- HÀM ẨN/HIỆN MẬT KHẨU (CON MẮT) ---
    function togglePassword(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            iconElement.textContent = "👁️‍🗨️"; // Mắt gạch chéo
        } else {
            passwordInput.type = "password";
            iconElement.textContent = "👁️"; // Mắt thường
        }
    }

    // Hàm xử lý Đăng ký / Đăng nhập
    function handleAuth(event, mode) {
        event.preventDefault();
        
        let userData = {};

        if (mode === 'register') {
            // 1. Lấy dữ liệu từ các ô nhập ở form ĐĂNG KÝ
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            // 2. Đóng gói dữ liệu thành đối tượng
            userData = {
               name: name, // Hoặc name: 'Khách hàng thân thiết' ở phần else
                 email: email,
                 pass: password, // <-- PHẢI LÀ 'pass' THÌ BÊN HOME MỚI ĐỌC ĐƯỢC user.pass
                 avatar: 'https://cdn-icons-png.flaticon.com/512/1998/1998592.png',
                 role: 'Thành viên mới'
            };

            alert('Chúc mừng ' + name + '! Bạn đã tạo tài khoản thành công.');
        } else {
            // 1. Lấy dữ liệu từ form ĐĂNG NHẬP
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value; // Lấy mật khẩu thật
            
            // Giả lập lấy thông tin cũ (vì mình chưa có database thật)
            userData = {
                name: 'Khách hàng thân thiết',
                email: email,
                pass: password, // Lưu mật khẩu thật
                avatar: 'https://cdn-icons-png.flaticon.com/512/1998/1998592.png'
            };
        }

        // 3. LƯU VÀO LOCALSTORAGE 
        // Chúng ta chuyển đối tượng sang chuỗi JSON để lưu được vào trình duyệt
        localStorage.setItem('userLoggedIn', JSON.stringify(userData));
        
        // 4. CHUYỂN HƯỚNG SANG TRANG CHỦ
        window.location.href = 'Home.html';
    }
</script>

</body>
</html>
