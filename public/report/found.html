<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Báo Tin Đã Tìm Thấy Bé</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;background-color:#f3f4f6}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-2xl bg-white rounded-2xl overflow-hidden shadow-xl my-8">
    <div class="bg-emerald-800 px-6 py-4 flex items-center justify-between text-white">
      <h1 class="text-lg font-bold uppercase tracking-wide">Báo tin đã tìm thấy bé</h1>
      <a href="/"><button type="button" class="hover:bg-emerald-700 p-1 rounded-full">✕</button></a>
    </div>
    <form id="foundForm" class="p-8 space-y-6" enctype="multipart/form-data">
      <input type="hidden" name="type" value="found">
      <div id="foundAlert" class="hidden rounded-lg px-4 py-3 text-sm font-medium"></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm font-semibold text-gray-700 block mb-2">Loài thú cưng</label>
          <select name="species" class="w-full px-4 py-2 rounded-lg border border-gray-200"><option value="dog">Chó</option><option value="cat">Mèo</option><option value="other">Khác</option></select>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 block mb-2">Giới tính</label>
          <select name="gender" class="w-full px-4 py-2 rounded-lg border border-gray-200"><option value="unknown">Không rõ</option><option value="male">Đực</option><option value="female">Cái</option></select>
        </div>
      </div>
      <div><label class="text-sm font-semibold text-gray-700 block mb-2">Màu lông</label><input type="text" name="furColor" class="w-full px-4 py-2 rounded-lg border border-gray-200"></div>
      <div><label class="text-sm font-semibold text-gray-700 block mb-2">📍 Vị trí phát hiện <span class="text-red-500">*</span></label><input type="text" name="location" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
      <div><label class="text-sm font-semibold text-gray-700 block mb-2">Mô tả tình trạng</label><textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-200"></textarea></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div><label class="text-sm font-semibold text-gray-700 block mb-2">Tên người tìm thấy <span class="text-red-500">*</span></label><input type="text" name="finderName" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        <div><label class="text-sm font-semibold text-gray-700 block mb-2">SĐT <span class="text-red-500">*</span></label><input type="tel" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
      </div>
      <div><label class="text-sm font-semibold text-gray-700 block mb-2">Email</label><input type="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
      <div><label class="text-sm font-semibold text-gray-700 block mb-2">Hình ảnh <span class="text-red-500">*</span></label><input id="foundImages" type="file" name="images" accept="image/*" multiple required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
      <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl">Gửi thông báo tới chủ nhân</button>
    </form>
  </div>
  <script>
    (function(){
      var form=document.getElementById('foundForm');
      var alertBox=document.getElementById('foundAlert');
      var phoneRegex=/^[0-9\-\+]{9,15}$/;
      function showMessage(message,isError){
        alertBox.textContent=message;
        alertBox.classList.remove('hidden','bg-red-100','text-red-700','bg-emerald-100','text-emerald-700');
        alertBox.classList.add(isError?'bg-red-100':'bg-emerald-100',isError?'text-red-700':'text-emerald-700');
      }
      form.addEventListener('submit',async function(e){
        e.preventDefault();
        var fileInput=document.getElementById('foundImages');
        var phoneInput=form.querySelector('input[name="phone"]');
        var submitBtn=form.querySelector('button[type="submit"]');
        var originalText=submitBtn.textContent;
        var phoneValue=phoneInput?phoneInput.value.trim():'';
        if(!fileInput.files||fileInput.files.length===0){showMessage('Vui lòng tải lên ít nhất một ảnh.',true);return;}
        if(phoneValue&&!phoneRegex.test(phoneValue)){showMessage('Số điện thoại không hợp lệ (9-15 ký tự số).',true);return;}
        submitBtn.disabled=true;submitBtn.textContent='Đang gửi...';
        try{
          var response=await fetch('/api/v1/reports',{method:'POST',body:new FormData(form)});
          var data=await response.json();
          if(!response.ok||!data.success){showMessage((data&&data.message)||'Gửi báo cáo thất bại.',true);return;}
          showMessage('Đăng tin thành công. Đang chuyển trang...',false);
          setTimeout(function(){window.location.href='/reports/list?submitted=1';},350);
        }catch(error){showMessage('Gửi báo cáo thất bại. Vui lòng thử lại.',true);}finally{submitBtn.disabled=false;submitBtn.textContent=originalText;}
      });
    })();
  </script>
</body>
</html>
