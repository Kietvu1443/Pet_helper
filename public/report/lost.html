<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Tin Tìm Bé Lạc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <form id="lostReportForm" class="bg-white w-full max-w-5xl rounded-2xl shadow-2xl overflow-hidden transition-all" enctype="multipart/form-data">
    <input type="hidden" name="type" value="lost">
    <div id="reportFeedback" class="hidden mx-6 mt-6 px-4 py-3 rounded-xl text-sm font-medium"></div>
    <div class="bg-[#2a6b47] px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="bg-[#ff4757] text-white text-xs font-bold px-2.5 py-1 rounded shadow-sm tracking-wider">SOS</span>
        <h1 class="text-white font-bold text-lg sm:text-xl uppercase tracking-wide">Đăng tin tìm bé lạc</h1>
      </div>
      <a href="/"><button type="button" class="text-white/80 hover:text-white hover:bg-white/20 rounded-full p-1.5 transition-colors">✕</button></a>
    </div>
    <div class="p-6 sm:p-8 bg-[#f8fafc] space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="pet_type" class="block text-sm font-semibold text-gray-700 mb-2">Loài <span class="text-red-500">*</span></label>
          <select id="pet_type" name="pet_type" required class="w-full px-4 py-3 rounded-xl border border-gray-300">
            <option value="dog">Chó</option><option value="cat">Mèo</option><option value="other">Khác</option>
          </select>
        </div>
        <div>
          <label for="gender" class="block text-sm font-semibold text-gray-700 mb-2">Giới tính <span class="text-red-500">*</span></label>
          <select id="gender" name="gender" required class="w-full px-4 py-3 rounded-xl border border-gray-300">
            <option value="unknown">Chưa rõ</option><option value="male">Đực</option><option value="female">Cái</option>
          </select>
        </div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Tên gọi của bé <span class="text-red-500">*</span></label><input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="Ví dụ: Bé Lu, Mi Mi..."></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Giống (Species) <span class="text-red-500">*</span></label><input type="text" name="species" required class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="Ví dụ: Poodle, Mèo mướp..."></div>
        <div class="md:col-span-2"><label class="block text-sm font-semibold text-gray-700 mb-2">Màu sắc <span class="text-red-500">*</span></label><input type="text" name="color" required class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="Ví dụ: Nâu đỏ, Vàng trắng, Đen tuyền..."></div>
      </div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-2">Đặc điểm nhận dạng chi tiết / Ghi chú thêm</label><textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="Ví dụ: Bé có đeo vòng cổ màu xanh..."></textarea></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-2">📍 Vị trí cuối cùng nhìn thấy bé <span class="text-red-500">*</span></label><input type="text" name="location" required class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="Ví dụ: Số nhà, tên đường, khu vực..."></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Số điện thoại liên lạc <span class="text-red-500">*</span></label><input type="tel" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="090x xxx xxx"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-2">Email liên hệ</label><input type="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-300" placeholder="nguyenvana@email.com"></div>
      </div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-2">Tải ảnh bé lên (giúp tìm nhanh hơn)</label><input type="file" name="images" accept="image/*" multiple class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
    </div>
    <div class="bg-white px-6 py-5 border-t border-gray-100 flex justify-end"><button type="submit" class="w-full sm:w-auto bg-[#e11d48] hover:bg-[#be123c] text-white font-bold py-3 px-8 rounded-xl">ĐĂNG TIN TÌM KIẾM</button></div>
  </form>
  <script>
    (function(){
      const form=document.getElementById('lostReportForm');
      const feedback=document.getElementById('reportFeedback');
      const phoneRegex=/^[0-9\-\+]{9,15}$/;
      function setFeedback(message,isError){
        feedback.textContent=message;
        feedback.classList.remove('hidden','bg-red-100','text-red-700','bg-green-100','text-green-700');
        feedback.classList.add(isError?'bg-red-100':'bg-green-100',isError?'text-red-700':'text-green-700');
      }
      form.addEventListener('submit',async function(event){
        event.preventDefault();
        const fileInput=form.querySelector('input[name="images"]');
        const phoneInput=form.querySelector('input[name="phone"]');
        const submitButton=form.querySelector('button[type="submit"]');
        const originalText=submitButton.textContent;
        const phoneValue=String(phoneInput.value||'').trim();
        if(!fileInput.files||fileInput.files.length===0){setFeedback('Vui lòng tải lên ít nhất một ảnh.',true);return;}
        if(!phoneValue||!phoneRegex.test(phoneValue)){setFeedback('Số điện thoại không hợp lệ (9-15 ký tự số).',true);return;}
        submitButton.disabled=true;submitButton.textContent='Đang gửi...';
        try{
          const response=await fetch('/api/v1/reports',{method:'POST',body:new FormData(form)});
          const payload=await response.json();
          if(!response.ok||!payload.success){setFeedback((payload&&payload.message)||'Gửi báo cáo thất bại.',true);return;}
          setFeedback('Gửi báo cáo thành công. Đang chuyển trang...',false);
          setTimeout(function(){window.location.href='/reports/list?submitted=1';},350);
        }catch(error){setFeedback('Gửi báo cáo thất bại. Vui lòng thử lại.',true);}finally{submitButton.disabled=false;submitButton.textContent=originalText;}
      });
    })();
  </script>
</body>
</html>
